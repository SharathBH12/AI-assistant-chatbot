<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        background: #020617;
        min-height: 100vh;
        font-family: 'DM Sans', sans-serif;
        color: #e2e8f0;
        position: relative;
        overflow-x: hidden;
    }

    /* Ambient glow layer */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 55% 45% at 15% 5%,  rgba(99,102,241,0.22) 0%, transparent 60%),
            radial-gradient(ellipse 45% 55% at 85% 85%, rgba(6,182,212,0.18) 0%, transparent 60%),
            radial-gradient(ellipse 35% 40% at 55% 40%, rgba(236,72,153,0.1)  0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
    }

    /* Grid overlay */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
    }

    /* ─── Navbar ─── */
    .navbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(2,6,23,0.75) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(99,102,241,0.2) !important;
        padding: 0.75rem 1.5rem;
    }

    .navbar-brand {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.3rem;
        font-weight: 700;
        background: linear-gradient(90deg, #818cf8, #22d3ee, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.3px;
        text-decoration: none;
    }

    /* Nav buttons */
    .nav-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 16px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        font-family: 'DM Sans', sans-serif;
        text-decoration: none;
        border: 1px solid transparent;
        transition: all 0.2s ease;
        cursor: pointer;
    }

    .nav-btn-ghost {
        color: #94a3b8;
        border-color: rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
    }

    .nav-btn-ghost:hover {
        color: #e2e8f0;
        border-color: rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.08);
    }

    .nav-btn-cyan {
        color: #67e8f9;
        border-color: rgba(6,182,212,0.3);
        background: rgba(6,182,212,0.08);
    }

    .nav-btn-cyan:hover {
        color: #fff;
        background: rgba(6,182,212,0.18);
        border-color: rgba(6,182,212,0.5);
        box-shadow: 0 0 16px rgba(6,182,212,0.2);
    }

    .nav-btn-danger {
        color: #fca5a5;
        border-color: rgba(239,68,68,0.3);
        background: rgba(239,68,68,0.08);
    }

    .nav-btn-danger:hover {
        color: #fff;
        background: rgba(239,68,68,0.18);
        border-color: rgba(239,68,68,0.5);
        box-shadow: 0 0 16px rgba(239,68,68,0.2);
    }

    .nav-btn-primary {
        color: #fff;
        background: linear-gradient(135deg, #6366f1, #22d3ee);
        border-color: transparent;
    }

    .nav-btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(99,102,241,0.4);
        color: #fff;
    }

    .nav-btn-outline {
        color: #a5b4fc;
        border-color: rgba(99,102,241,0.3);
        background: rgba(99,102,241,0.07);
    }

    .nav-btn-outline:hover {
        color: #fff;
        background: rgba(99,102,241,0.18);
        border-color: rgba(99,102,241,0.5);
        box-shadow: 0 0 16px rgba(99,102,241,0.2);
    }

    /* Nav button spacing */
    .nav-actions {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* ─── Page content wrapper ─── */
    .page-content {
        position: relative;
        z-index: 1;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }

    ::-webkit-scrollbar-track {
        background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
        background: rgba(99,102,241,0.4);
        border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: rgba(99,102,241,0.7);
    }

    /* ─── Selection ─── */
    ::selection {
        background: rgba(99,102,241,0.35);
        color: #fff;
    }
    </style>

</head>

<body
    id="page-body">

<nav class="navbar">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            ✦ AI Chatbot
        </a>

        <div class="nav-actions">

            {% if user.is_authenticated %}

                <a href="/chat/" class="nav-btn nav-btn-ghost">
                    💬 Chat
                </a>

                <a href="/profile/" class="nav-btn nav-btn-cyan">
                    👤 Profile
                </a>

                <button
                    id="theme-toggle"
                    class="btn btn-outline-warning me-2">
                    🌙
                </button>

                <a href="/logout/" class="nav-btn nav-btn-danger">
                    ⎋ Logout
                </a>

            {% else %}

                <a href="/login/" class="nav-btn nav-btn-outline">
                    Sign In
                </a>

                <button
                    id="theme-toggle"
                    class="btn btn-outline-warning me-2">
                    🌙
                </button>

                <a href="/register/" class="nav-btn nav-btn-primary">
                    Get Started →
                </a>

            {% endif %}

        </div>

    </div>
</nav>

<div class="container mt-5 page-content">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const body =
    document.getElementById(
        "page-body"
    );
const button =
    document.getElementById(
        "theme-toggle"
    );
if(
    localStorage.getItem(
        "theme"
    ) === "light"
){
    body.classList.remove(
        "bg-dark",
        "text-light"
    );
    body.classList.add(
        "bg-light",
        "text-dark"
    );
    button.innerHTML = "☀️";
}
button.addEventListener(
    "click",
    function(){
        if(
            body.classList.contains(
                "bg-dark"
            )
        ){
            body.classList.remove(
                "bg-dark",
                "text-light"
            );
            body.classList.add(
                "bg-light",
                "text-dark"
            );
            localStorage.setItem(
                "theme",
                "light"
            );
            button.innerHTML =
                "☀️";
        }else{
            body.classList.remove(
                "bg-light",
                "text-dark"
            );
            body.classList.add(
                "bg-dark",
                "text-light"
            );
            localStorage.setItem(
                "theme",
                "dark"
            );
            button.innerHTML =
                "🌙";
        }
    }
);
</script>

</body>
</html>
